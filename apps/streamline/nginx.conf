# =============================================================================
# Nginx reverse proxy config for Cloud Run
# Handles: TLS termination, gzip, security headers, request buffering
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
pid /tmp/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  # ─── Basics ────────────────────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  server_tokens off;

  # ─── Logging ───────────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
    '"time":"$time_iso8601",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"request_time":$request_time,'
    '"remote_addr":"$remote_addr",'
    '"x_request_id":"$http_x_request_id",'
    '"upstream_response_time":"$upstream_response_time"'
    '}';

  access_log /dev/stdout json_combined;
  error_log  /dev/stderr warn;

  # ─── Performance ───────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;

  # ─── Gzip ──────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml;

  # ─── Body size limit ───────────────────────────────────────────────────
  client_max_body_size 5m;
  client_body_timeout  30s;
  client_header_timeout 30s;

  # ─── Proxy timeouts ────────────────────────────────────────────────────
  proxy_connect_timeout 10s;
  proxy_send_timeout    60s;
  proxy_read_timeout    60s;
  proxy_buffering       off;

  # ─── Rate limiting ─────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
  limit_req_status  429;
  limit_conn_status 429;

  # ─── Upstream ──────────────────────────────────────────────────────────
  upstream streamline_api {
    server 127.0.0.1:8080;
    keepalive 32;
  }

  # ─── Server block ──────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options           "DENY"                    always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Health check — bypasses rate limiting
    location = /health {
      proxy_pass http://streamline_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      access_log off;
    }

    location = /ready {
      proxy_pass http://streamline_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      access_log off;
    }

    # API routes
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      limit_conn conn_limit 20;

      proxy_pass http://streamline_api;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      # Forward correlation ID
      proxy_set_header X-Request-ID $http_x_request_id;

      # Remove sensitive response headers
      proxy_hide_header X-Powered-By;
      proxy_hide_header Server;
    }

    # Deny everything else
    location / {
      return 404 '{"error":{"code":"NOT_FOUND","message":"Route not found"}}\n';
      add_header Content-Type application/json;
    }
  }
}
