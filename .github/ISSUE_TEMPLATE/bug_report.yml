name: Bug Report
description: Report a bug in Streamline
labels: ['bug', 'triage']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: 'Node 20.11.1, macOS 14.2, Chrome 120'
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
